"$schema" = "./node_modules/wrangler/config-schema.json"
name = "inboxfornow-api"
main = "src/index.ts"
compatibility_date = "2026-05-22"

# Custom domain — add zone in Cloudflare first, then deploy.
# Dashboard: Workers → inboxfornow-api → Domains → api.inboxfornow.com
[[routes]]
pattern = "api.inboxfornow.com"
custom_domain = true

[vars]
CORS_ORIGIN = "https://inboxfornow.com,https://inboxfornow.pages.dev"
# Set with `wrangler secret put ADMIN_BASIC_AUTH`.
# Value is base64("username:password") for the /admin/domains route.

[[d1_databases]]
binding = "DB"
database_name = "inboxfornow"
database_id = "a15cbdef-db25-439b-91d8-0530c5b21038"
migrations_dir = "migrations"

[[ratelimits]]
name = "INBOX_GENERATION_RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 10
  period = 60

[triggers]
crons = ["*/5 * * * *"]

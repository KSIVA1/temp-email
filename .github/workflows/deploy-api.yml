name: Deploy API Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/inboxfornow-api/**'
      - 'infra/scripts/deploy-worker.sh'
      - '.github/workflows/deploy-api.yml'

concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: workers/inboxfornow-api/package-lock.json

      - name: Install worker dependencies
        working-directory: workers/inboxfornow-api
        run: npm ci

      - name: Run tests
        working-directory: workers/inboxfornow-api
        run: npm test

      - name: Apply D1 migrations
        working-directory: workers/inboxfornow-api
        run: npx wrangler d1 migrations apply inboxfornow --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        working-directory: workers/inboxfornow-api
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
